[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  "cd client && npm install && cd ..",
  "cd server && npm install && cd .."
]

[phases.build]
cmds = [
  "cd client && npm run build && cd ..",
  "cd server && npx prisma generate && cd .."
]

[start]
cmd = "cd server && npx prisma migrate deploy && node src/index.js"
